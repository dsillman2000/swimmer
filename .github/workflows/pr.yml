name: PR Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.0"
          bundler-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm install

      - name: Build CSS
        run: npx @tailwindcss/cli -i _css/styles.css -o styles.css --minify

      - name: Build site
        run: bundle exec jekyll build
